<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e3a8a;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.4" />
    </filter>
  </defs>
  <!-- Background Circle with elegant gradient -->
  <circle cx="256" cy="256" r="240" fill="url(#grad)" filter="url(#shadow)" />
  <!-- Innner design - Glowing stylized Brain emoji representing high performance study -->
  <text x="256" y="320" font-size="200" font-family="Segoe UI Emoji, Apple Color Emoji, Roboto" text-anchor="middle" fill="#ffffff" filter="drop-shadow(0px 8px 12px rgba(0,0,0,0.5))">🧠</text>
  <!-- Stylish outer ring border -->
  <circle cx="256" cy="256" r="236" fill="none" stroke="#60a5fa" stroke-width="6" opacity="0.5" />
</svg>
